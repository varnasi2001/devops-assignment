apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - repoURL: https://github.com/CHANGE_ME/devops-assignment
    targetRevision: main
    ref: values
  - repoURL: https://github.com/CHANGE_ME/devops-assignment
    targetRevision: main
    path: helm-templates/mongodb
    helm:
      releaseName: mongodb
      valueFiles:
      - $values/helm-overrides/mongodb/custom-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mongodb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
