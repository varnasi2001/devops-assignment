# I have used this as a common one instead of separating prometheus & grafana charts
# https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
kube-prometheus-stack:
  fullnameOverride: kps

  prometheus:
    prometheusSpec:
      # Scrape all ServiceMonitors regardless of the release-label match
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      retention: 3d
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts: [prometheus.local]

  grafana:
    adminUser: admin
    adminPassword: admin
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts: [grafana.local]
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
    defaultDashboardsEnabled: true
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
        - name: articles
          folder: Articles
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/articles
    dashboards:
      articles:
        articles-api:
          json: |
            {
              "annotations": {"list": []},
              "editable": true,
              "panels": [
                {
                  "type": "timeseries",
                  "title": "HTTP requests/sec",
                  "targets": [{"expr": "sum by (method, code) (rate(http_request_duration_seconds_count[1m]))", "legendFormat": "{{method}} {{code}}"}],
                  "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
                },
                {
                  "type": "timeseries",
                  "title": "p95 latency",
                  "targets": [{"expr": "histogram_quantile(0.95, sum by (le, route) (rate(http_request_duration_seconds_bucket[5m])))", "legendFormat": "{{route}}"}],
                  "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
                }
              ],
              "schemaVersion": 39,
              "title": "Articles API",
              "uid": "articles-api",
              "version": 1
            }

  alertmanager:
    enabled: false     # not needed for the assignment demo

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: true

  # Reduce cardinality — disable the heavier scrapers
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
