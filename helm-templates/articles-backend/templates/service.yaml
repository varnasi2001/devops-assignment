apiVersion: v1
kind: Service
metadata:
  name: {{ include "articles.fullname" . }}
  labels: {{- include "articles.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector: {{- include "articles.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "articles.fullname" . }}
  labels: {{- include "articles.labels" . | nindent 4 }}
