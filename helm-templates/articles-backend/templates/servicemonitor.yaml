{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "articles.fullname" . }}
  labels: {{- include "articles.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{- include "articles.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
{{- end }}
