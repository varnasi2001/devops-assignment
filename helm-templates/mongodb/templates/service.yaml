apiVersion: v1
kind: Service
metadata:
  name: {{ include "mongodb.headless" . }}
  labels: {{- include "mongodb.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: mongodb
    port: {{ .Values.service.port }}
    targetPort: mongodb
  selector: {{- include "mongodb.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mongodb.fullname" . }}
  labels: {{- include "mongodb.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: mongodb
    port: {{ .Values.service.port }}
    targetPort: mongodb
  selector: {{- include "mongodb.selectorLabels" . | nindent 4 }}
{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mongodb.fullname" . }}
  labels: {{- include "mongodb.labels" . | nindent 4 }}
{{- end }}
